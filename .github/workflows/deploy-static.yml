name: Deploy RapStudio Static

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify integration hooks
        run: |
          python - <<'PY'
          from pathlib import Path
          s = Path("rapstudio_v8.html").read_text(encoding="utf-8", errors="ignore")
          required = ["id=\"s-tools\"", "runIntegrationChecks()", "runHfLyricBoost()", "applyEngine('fl',this)"]
          missing = [r for r in required if r not in s]
          if missing:
              raise SystemExit(f"Missing hooks: {missing}")
          print("verification passed")
          PY

  deploy-vercel:
    needs: verify
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build (static)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-netlify:
    needs: verify
    runs-on: ubuntu-latest
    if: ${{ secrets.NETLIFY_AUTH_TOKEN != '' && secrets.NETLIFY_SITE_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Netlify CLI
        run: npm i -g netlify-cli@latest
      - name: Deploy
        run: netlify deploy --dir=. --prod --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
